services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - CORS_ORIGIN=http://localhost:8080

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE: http://localhost:8787
    ports:
      - "8080:80"
    depends_on:
      - api
